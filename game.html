<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모험 중 - Gemini TRPG</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #6c5ce7;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Pretendard', sans-serif;
        }

        /* 채팅창 영역 */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 5%; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /* 메시지 기본 스타일 */
        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 75%; 
            line-height: 1.6;
            word-break: break-all;
            position: relative;
        }

        /* 마스터 메시지 */
        .master { 
            background: #2a2a2a; 
            align-self: flex-start; 
            border-left: 5px solid var(--accent);
            border-bottom-left-radius: 2px;
        }

        /* 플레이어 메시지 */
        .player { 
            background: var(--accent); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        /* 입력 영역 */
        #input-area { 
            padding: 20px 5%; 
            display: flex; 
            gap: 12px; 
            background: var(--card-bg); 
            border-top: 1px solid #333;
        }

        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button { 
            padding: 0 25px; 
            background: var(--accent); 
            border: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 로딩 애니메이션 (점 세 개) */
        .typing { 
            display: flex; 
            gap: 6px; 
            padding: 15px; 
            align-items: center; 
        }

        .dot {
            width: 8px; 
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>
    <div id="chat-window"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="당신의 행동을 결정하세요..." autocomplete="off">
        <button id="send-btn">전송</button>
    </div>

        <script>
            const scenarioId = window.location.pathname.split('/').pop();
            const chatWindow = document.getElementById('chat-window');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');

            // 1. 메시지 추가 함수
            function addMessage(sender, text) {
                const div = document.createElement('div');
                div.className = `msg ${sender === '마스터' ? 'master' : 'player'}`;
                div.innerText = `${sender}: ${text}`;
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            // 2. 마스터의 스트리밍용 말풍선 생성 함수
            function createStreamMsg() {
                const div = document.createElement('div');
                div.className = 'msg master';
                div.innerText = "마스터: "; // 이름표만 달아둠
                chatWindow.appendChild(div);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                return div;
            }

            // 3. 메시지 전송 로직 (스트리밍)
            async function send() {
                const text = userInput.value.trim();
                if (!text) return;

                addMessage("플레이어", text);
                userInput.value = '';

                const masterMsgDiv = createStreamMsg();

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ scenarioId, userMessage: text })
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        masterMsgDiv.innerText += chunk; 
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    }
                } catch (err) {
                    masterMsgDiv.innerText += " (마법의 흐름이 끊겼습니다.)";
                }
            }

            // 4. 게임 시작 첫 인사 (스트리밍)
            async function start() {
                const masterMsgDiv = createStreamMsg();

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ scenarioId }) // userMessage 없이 전송
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        masterMsgDiv.innerText += chunk; 
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    }
                } catch (err) {
                    masterMsgDiv.innerText = "마스터: 모험의 서를 펼치는 데 실패했습니다.";
                }
            }

            // 5. 이벤트 리스너
            sendBtn.addEventListener('click', send);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') send();
            });

            // 페이지 실행 시 마스터가 먼저 말 걸기
            start();
        </script>
</body>
</html>
