<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모험 중 - Gemini TRPG</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #6c5ce7;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Pretendard', sans-serif;
        }

        /* 채팅창 영역 */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 5%; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /* 메시지 기본 스타일 */
        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 75%; 
            line-height: 1.6;
            word-break: break-all;
            position: relative;
        }

        /* 마스터 메시지 */
        .master { 
            background: #2a2a2a; 
            align-self: flex-start; 
            border-left: 5px solid var(--accent);
            border-bottom-left-radius: 2px;
        }

        /* 플레이어 메시지 */
        .player { 
            background: var(--accent); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        /* 입력 영역 */
        #input-area { 
            padding: 20px 5%; 
            display: flex; 
            gap: 12px; 
            background: var(--card-bg); 
            border-top: 1px solid #333;
        }

        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button { 
            padding: 0 25px; 
            background: var(--accent); 
            border: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 로딩 애니메이션 (점 세 개) */
        .typing { 
            display: flex; 
            gap: 6px; 
            padding: 15px; 
            align-items: center; 
        }

        .dot {
            width: 8px; 
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        /* 로딩 애니메이션 스타일 */
        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            font-style: italic;
            margin: 10px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div style="padding: 10px; background: #1e1e1e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px;">
    <span style="font-size: 0.9rem; color: #b3b3b3;">마스터 지능:</span>
    <select id="model-select" style="background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px; padding: 5px;">
        <option value="gpt-5.4-mini">gpt-5.4-mini (빠름 - 추천)</option>
        <option value="gpt-5.4-nano">gpt-5.4-nano(더 빠름)</option>
        <option value="gpt-5.4">GPT-5.4 (오래걸림)</option>

    </select>
    </div>
    <button onclick="clearLogs()" style="background: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">대화 초기화</button>
</div>
    <div id="chat-window"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="당신의 행동을 결정하세요..." autocomplete="off">
        <button id="send-btn">전송</button>
    </div>

<script>
    const scenarioId = window.location.pathname.split('/').pop();
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // 페이지 로드 시 실행될 함수
window.onload = async () => {
    // 1. URL 경로에서 시나리오 ID 추출 (예: /game/65f123... 에서 ID만 뽑기)
    const pathSegments = window.location.pathname.split('/');
    const scenarioId = pathSegments[pathSegments.length - 1];

    if (!scenarioId || scenarioId === 'game') {
        console.error("❌ 시나리오 ID를 찾을 수 없습니다.");
        return;
    }

    console.log("📍 로드 중인 시나리오 ID:", scenarioId);

    // 2. 시나리오 정보 로드 (제목 등)
    await loadScenarioInfo(scenarioId); 

    // 3. 💡 저장된 대화 로그 불러오기 핵심 로직
    try {
        const response = await fetch(`/api/chat/${scenarioId}`);
        if (response.ok) {
            const history = await response.json();
            const chatBox = document.getElementById('chat-box');
            
            // 기존 화면 비우고 다시 그리기
            chatBox.innerHTML = ''; 

            history.forEach(msg => {
                const sender = (msg.role === 'user') ? '나' : '마스터';
                addMessage(sender, msg.content);
            });
            
            chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 하단 이동
            console.log("✅ 대화 기록 복구 완료");
        }
    } catch (err) {
        console.error("❌ 기록 불러오기 에러:", err);
    }
};

// 💡 DB에서 대화 내역 가져오기
async function loadChatHistory(scenarioId) {
    const response = await fetch(`/api/chat/${scenarioId}`);
    if (response.ok) {
        const history = await response.json();
        const chatBox = document.getElementById('chat-box');
        
        history.forEach(msg => {
            const sender = msg.role === 'user' ? '나' : '마스터';
            addMessage(sender, msg.content);
        });
        
        // 스크롤을 맨 아래로 이동
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}

    // 1. 메시지 추가 함수 (마스터와 플레이어 색상 구분)
    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `msg ${sender === '마스터' ? 'master' : 'player'}`;
        div.innerText = `${sender}: ${text}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 2. 대답 중... 로딩 애니메이션 추가 함수
    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'ai-loading';
        loadingDiv.className = 'loading';
        loadingDiv.innerHTML = `
            <span>마스터가 주사위를 굴리는 중</span>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        `;
        chatWindow.appendChild(loadingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 3. 로딩 애니메이션 제거 함수
    function hideLoading() {
        const loader = document.getElementById('ai-loading');
        if (loader) loader.remove();
    }


async function send(initialText = null) {
    // 1. 텍스트 결정
    const text = initialText !== null ? initialText : userInput.value.trim();
    if (initialText === null && !text) return;

    // 2. 모델 값 가져오기 (상자가 없어도 에러 안 나게 방어막 설치)
    const modelSelector = document.getElementById('model-select');
    const selectedModel = modelSelector ? modelSelector.value : "gpt-5.4-mini";

    // 브라우저 콘솔 확인용
    console.log("📤 전송 준비 - 모델:", selectedModel, "내용:", text);

    if (initialText === null) {
        addMessage("플레이어", text);
        userInput.value = '';
    }

    showLoading();

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                scenarioId: scenarioId, // 명확하게 scenarioId 지정
                userMessage: text,
                model: selectedModel 
            })
        });

        hideLoading();

        // 3. 응답 처리
        if (response.ok) {
            const replyText = await response.text();
            addMessage("마스터", replyText);
        } else {
            // 500 에러 등이 발생하면 여기서 잡힘
            const errorText = await response.text();
            console.error("❌ 서버 응답 에러:", errorText);
            addMessage("시스템", `마스터가 혼란에 빠졌습니다. (에러: ${response.status})`);
        }
    } catch (err) {
        hideLoading();
        console.error("❌ 통신 에러:", err);
        addMessage("시스템", "서버와 연결할 수 없습니다.");
    }
}

    // 5. 게임 시작 첫 인사
    function start() {
        // 서버의 userMessage 파라미터가 비어있으면 "게임 시작을 선언해줘"로 인식하도록 해둠
        send(""); 
    }

    // 6. 이벤트 리스너 (버튼 클릭 및 엔터키)
    sendBtn.addEventListener('click', () => send());
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') send();
    });
    // 💡 페이지 로드 시 이전 대화 불러오기
async function loadHistory() {
    const response = await fetch(`/api/chat/${scenarioId}`);
    if (response.ok) {
        const history = await response.json();
        history.forEach(msg => {
            const sender = msg.role === 'user' ? '플레이어' : '마스터';
            addMessage(sender, msg.content);
        });
    }
}

// 💡 대화 초기화 함수
async function clearLogs() {
    if (!confirm("지금까지의 모든 대화 기록을 지울까요?")) return;
    
    const response = await fetch(`/api/chat/${scenarioId}`, { method: 'DELETE' });
    if (response.ok) {
        document.getElementById('chat-box').innerHTML = ''; // 화면 지우기
        addMessage("시스템", "대화 기록이 모두 삭제되었습니다.");
    }
}

// 기존 window.onload에 추가
window.onload = async () => {
    await loadScenarioInfo(); // 기존 시나리오 정보 로드
    await loadHistory();      // 💡 추가: 이전 대화 로드
};

    // 페이지 접속 시 마스터가 먼저 말 걸기
    start();
</script>
</body>
</html>
