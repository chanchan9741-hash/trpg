<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모험 중 - Gemini TRPG</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #6c5ce7;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Pretendard', sans-serif;
        }

        /* 채팅창 영역 */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 5%; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /* 메시지 기본 스타일 */
        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 75%; 
            line-height: 1.6;
            word-break: break-all;
            position: relative;
        }

        /* 마스터 메시지 */
        .master { 
            background: #2a2a2a; 
            align-self: flex-start; 
            border-left: 5px solid var(--accent);
            border-bottom-left-radius: 2px;
        }

        /* 플레이어 메시지 */
        .player { 
            background: var(--accent); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        /* 입력 영역 */
        #input-area { 
            padding: 20px 5%; 
            display: flex; 
            gap: 12px; 
            background: var(--card-bg); 
            border-top: 1px solid #333;
        }

        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button { 
            padding: 0 25px; 
            background: var(--accent); 
            border: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 로딩 애니메이션 (점 세 개) */
        .typing { 
            display: flex; 
            gap: 6px; 
            padding: 15px; 
            align-items: center; 
        }

        .dot {
            width: 8px; 
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        /* 로딩 애니메이션 스타일 */
        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            font-style: italic;
            margin: 10px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div style="padding: 10px; background: #1e1e1e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px;">
    <span style="font-size: 0.9rem; color: #b3b3b3;">마스터 지능:</span>
    <select id="model-select" style="background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px; padding: 5px;">
        <option value="gpt-5.4-mini">gpt-5.4-mini (빠름 - 추천)</option>
        <option value="gpt-5.4-nano">gpt-5.4-nano(더 빠름)</option>
        <option value="gpt-5.4">GPT-5.4 (오래걸림)</option>

    </select>
    </div>
    <button onclick="clearLogs()" style="background: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">대화 초기화</button>
</div>

<div id="game-container" style="display: flex; height: 90vh;">
    <div id="chat-section" style="flex: 3; display: flex; flex-direction: column; border-right: 1px solid #444;">
        <div id="chat-window" style="flex: 1; overflow-y: auto; padding: 20px;">
            </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="행동을 입력하세요...">
            <button id="send-btn">전송</button>
        </div>
    </div>

    <div id="quest-section" style="flex: 1; padding: 20px; background: #1a1a1a; overflow-y: auto;">
        <h3 style="color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 10px;">📜 주요 사건 기록</h3>
        <ul id="quest-list" style="list-style: none; padding: 0; line-height: 1.8;">
            </ul>
    </div>
</div>
    

 <script>
    const chatWindow = document.getElementById('chat-window'); 
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let scenarioId = "";

    window.onload = async () => {
        const urlParts = window.location.pathname.split('/');
        scenarioId = urlParts[urlParts.length - 1];

        if (!scenarioId || scenarioId === 'game') {
            console.error("❌ 시나리오 ID를 찾을 수 없습니다.");
            return;
        }

        await loadScenarioInfo(); 
        await loadHistory();
    };

    async function loadScenarioInfo() {
        try {
            const response = await fetch(`/api/scenario/${scenarioId}`);
            const data = await response.json();
            
            // 시나리오 정보 UI 업데이트 (ID 확인 필요)
            const titleEl = document.getElementById('scenario-title');
            if(titleEl) titleEl.innerText = data.title;
            
            // 우측 퀘스트 UI 업데이트
            updateQuestUI(data.questLines);
        } catch (err) {
            console.error("시나리오 정보 로드 실패", err);
        }
    }

    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `msg ${sender === '마스터' ? 'master' : 'player'}`;
        div.innerText = `${sender}: ${text}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

async function loadHistory() {
    try {
        const response = await fetch(`/api/chat/${scenarioId}`);
        if (!response.ok) throw new Error('데이터를 가져오지 못했습니다.');
        
        const history = await response.json();
        
        // 🔍 [디버깅] 브라우저 콘솔(F12)에 데이터가 어떻게 들어오는지 찍어봅니다.
        console.log("받은 채팅 내역:", history);

        const chatWindow = document.getElementById('chat-window');
        chatWindow.innerHTML = ''; // 기존 로딩 메시지 비우기

        if (history && history.length > 0) {
            history.forEach(msg => {
                // DB의 필드명이 'role', 'content'가 맞는지 확인하며 화면에 추가
                // 만약 DB 필드명이 다르다면 이 부분을 수정해야 합니다.
                const sender = msg.role === 'user' ? '나' : '마스터';
                const text = msg.content || "내용 없음";
                
                addMessage(sender, text);
            });
            console.log("✅ 화면에 34개 메시지 출력 완료!");
        } else {
            console.log("❓ 데이터는 왔는데 배열이 비어있습니다.");
            start();
        }
    } catch (err) {
        console.error("❌ 채팅 로드 중 프론트엔드 에러:", err);
    }
}

    // 🌟 핵심 수정: 메시지 전송 함수
    async function send(message = null) {
        // [해결] userText 변수를 명확히 정의
        const userText = message !== null ? message : userInput.value.trim();
        if (!userText) return;

        if (message === null) {
            addMessage("나", userText);
            userInput.value = "";
        }

        showLoading(); // 로딩 시작

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    scenarioId: scenarioId,
                    userMessage: userText, // 서버가 기다리는 이름
                    model: document.getElementById('model-select').value
                })
            });

            if (response.ok) {
                const data = await response.json(); // [해결] text()가 아니라 json()으로 받기
                hideLoading();
                
                // 마스터 답변 출력
                addMessage("마스터", data.reply);
                
                // 퀘스트 라인 실시간 업데이트
                if (data.questLines) {
                    updateQuestUI(data.questLines);
                }
            } else {
                hideLoading();
                addMessage("시스템", "마스터가 응답하지 않습니다.");
            }
        } catch (err) {
            hideLoading();
            console.error("❌ 통신 에러:", err);
            addMessage("시스템", "연결 에러가 발생했습니다.");
        }
    }

    function updateQuestUI(questLines) {
        const questList = document.getElementById('quest-list');
        if (!questList) return;
        questList.innerHTML = ""; 
        
        if (questLines && questLines.length > 0) {
            questLines.forEach(quest => {
                const li = document.createElement('li');
                li.style.padding = "8px 0";
                li.style.borderBottom = "1px solid #333";
                li.innerHTML = `📍 ${quest}`;
                questList.appendChild(li);
            });
        } else {
            questList.innerHTML = "<li style='color: #666;'>기록된 사건이 없습니다.</li>";
        }
    }

    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'ai-loading';
        loadingDiv.className = 'loading';
        loadingDiv.innerHTML = `<span>마스터가 주사위를 굴리는 중</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
        chatWindow.appendChild(loadingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function hideLoading() {
        const loader = document.getElementById('ai-loading');
        if (loader) loader.remove();
    }

    function start() { send("게임을 시작해줘."); }

    if (sendBtn) sendBtn.addEventListener('click', () => send());
    if (userInput) userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    // 🗑️ 대화 초기화 함수 (기존 버튼과 연결됨)
async function clearLogs() {
    if (!confirm("지금까지의 모든 대화 기록을 지울까요?")) return;
    
    try {
        const response = await fetch(`/api/chat/${scenarioId}`, { 
            method: 'DELETE' 
        });

        if (response.ok) {
            alert("기록이 성공적으로 초기화되었습니다.");
            location.reload(); // 화면 새로고침하여 대화창 비우기
        } else {
            const errorText = await response.text();
            console.error("초기화 실패:", errorText);
            alert("초기화 실패: 서버 응답에 문제가 있습니다.");
        }
    } catch (err) {
        console.error("네트워크 에러:", err);
        alert("초기화 실패: 네트워크 연결을 확인하세요.");
    }
}
</script>
</body>
</html>
