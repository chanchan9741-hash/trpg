<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모험 중 - Gemini TRPG</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #6c5ce7;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Pretendard', sans-serif;
        }
        #chat-window img {
            max-width: 300px; /* 원하는 가로 크기로 조절 (예: 300px) */
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 10px 0;
            display: block;
            border: 2px solid var(--accent); /* 테두리 효과 (선택사항) */
        }
        /* 채팅창 영역 */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 5%; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /* 메시지 기본 스타일 */
        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 75%; 
            line-height: 1.6;
            word-break: break-all;
            position: relative;
        }

        /* 마스터 메시지 */
        .master { 
            background: #2a2a2a; 
            align-self: flex-start; 
            border-left: 5px solid var(--accent);
            border-bottom-left-radius: 2px;
        }

        /* 플레이어 메시지 */
        .player { 
            background: var(--accent); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        /* 입력 영역 */
        #input-area { 
            padding: 20px 5%; 
            display: flex; 
            gap: 12px; 
            background: var(--card-bg); 
            border-top: 1px solid #333;
        }

        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button { 
            padding: 0 25px; 
            background: var(--accent); 
            border: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 로딩 애니메이션 (점 세 개) */
        .typing { 
            display: flex; 
            gap: 6px; 
            padding: 15px; 
            align-items: center; 
        }

        .dot {
            width: 8px; 
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        /* 로딩 애니메이션 스타일 */
        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            font-style: italic;
            margin: 10px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    
<header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #1e1e1e; border-bottom: 1px solid #333;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="location.href='/'" style="font-weight: bold; color: #6c5ce7; cursor: pointer;">Gemini TRPG</div>
        <select id="model-select" style="background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px; padding: 3px;">
            <option value="gpt-5.4-mini">gpt-5.4-mini</option>
            <option value="gpt-5.4-nano">gpt-5.4-nano</option>
            <option value="gpt-5.4">GPT-5.4</option>
        </select>
    </div>
    <button onclick="clearLogs()" style="background: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">대화 초기화</button>
</header>


<div id="game-container" style="display: flex; height: 90vh;">
    <div id="chat-section" style="flex: 3; display: flex; flex-direction: column; border-right: 1px solid #444;">
        <div id="chat-window" style="flex: 1; overflow-y: auto; padding: 20px;">
            </div>
        <div id="input-area" style="display: flex; gap: 10px; padding: 15px 5%; background: #1e1e1e; border-top: 1px solid #333; align-items: center;">
            <input type="text" id="user-input" placeholder="행동을 입력하세요..." style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; outline: none;">
            
            <button id="send-btn" style="background: #6c5ce7; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">전송</button>

            <button onclick="toggleStatusModal()" style="background: #444; color: white; border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap;">기록</button>
            <button onclick="toggleInventoryModal()" style="background: #27ae60; color: white; border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap;">가방</button>
            <button onclick="generateImage()" style="background: #e67e22; color: white; border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap;">그림</button>
        </div>




<div id="statusModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000;">
    <div style="position: relative; width: 80%; max-width: 600px; margin: 50px auto; background: #222; color: #eee; padding: 20px; border-radius: 10px; border: 1px solid #555; max-height: 80vh; overflow-y: auto;">
        
        <span onclick="toggleStatusModal()" style="position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer;">&times;</span>
        
        <h2 style="text-align: center; color: #ffd700;">📖 모험 로그</h2>
        
        <div style="margin-top: 20px;">
            <h3 style="border-bottom: 1px solid #444; padding-bottom: 5px;">📜 주요 사건 히스토리</h3>
            <ul id="event-list-modal" style="line-height: 1.8; color: #bbb;"></ul>
        </div>

        <div style="margin-top: 30px;">
            <h3 style="border-bottom: 1px solid #444; padding-bottom: 5px;">🎯 현재 진행 중인 퀘스트</h3>
            <div id="quest-list-modal"></div>
        </div>


        <button onclick="toggleStatusModal()" style="display: block; width: 100%; margin-top: 30px; padding: 10px; background: #555; color: white; border: none; border-radius: 5px; cursor: pointer;">닫기</button>
    </div>
</div>
<div id="inventoryModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2001;">
    <div style="position: relative; width: 80%; max-width: 400px; margin: 100px auto; background: #222; color: #eee; padding: 20px; border-radius: 10px; border: 1px solid #27ae60;">
        <span onclick="toggleInventoryModal()" style="position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer;">&times;</span>
        <h2 style="text-align: center; color: #2ecc71;">🎒 가방</h2>
        <ul id="inventory-list-modal" style="line-height: 2; font-size: 1.1rem; list-style: none; padding: 0;"></ul>
        <button onclick="toggleInventoryModal()" style="display: block; width: 100%; margin-top: 20px; padding: 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer;">닫기</button>
    </div>

 <script>
    const chatWindow = document.getElementById('chat-window'); 
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let scenarioId = "";
    // 전역 변수로 데이터 저장 (모달 열 때 최신화하기 위함)
let currentEvents = [];
let currentQuests = {};

// 모달 열고 닫기 함수
function toggleStatusModal() {
    const modal = document.getElementById('statusModal');
    if (modal.style.display === 'none' || modal.style.display === '') {
        renderStatusContent(); // 열 때 내용 다시 그리기
        modal.style.display = 'block';
    } else {
        modal.style.display = 'none';
    }
}

// 모달 내부 내용 그리기 함수
function renderStatusContent() {
    // 1. 사건 목록 렌더링
    const eventList = document.getElementById('event-list-modal');
    eventList.innerHTML = currentEvents.length > 0 
        ? currentEvents.map(e => `<li>${e}</li>`).join('') 
        : "<li>아직 기록된 주요 사건이 없습니다.</li>";

    // 2. 퀘스트 목록 렌더링 (병렬)
const questList = document.getElementById('quest-list-modal');
    const questEntries = Object.entries(currentQuests);
    
    if (questEntries.length > 0) {
        questList.innerHTML = questEntries.map(([title, content]) => {
            // 완료 여부 확인 (✅ 문구 포함 여부)
            const isCompleted = content.startsWith('✅');
            const style = isCompleted 
                ? 'background: #1a1a1a; border-left: 4px solid #555; opacity: 0.6; text-decoration: line-through;' 
                : 'background: #333; border-left: 4px solid #00bfff;';
            const titleColor = isCompleted ? '#888' : '#fff';

            return `
                <div style="${style} padding: 10px; margin-bottom: 10px; border-radius: 4px;">
                    <strong style="color: ${titleColor}; font-size: 1.1em;">${title}</strong><br>
                    <span style="color: #ccc; font-size: 0.9em;">${content}</span>
                </div>
            `;
        }).join('');
    } else {
        questList.innerHTML = "<p style='color: #888;'>진행 중인 퀘스트가 없습니다.</p>";
    }
}

// sendMessage 성공 시 데이터 업데이트 로직에 추가
// fetch 후 data를 받는 부분에서:
// currentEvents = data.questLines;
// currentQuests = data.quests;
    window.onload = async () => {
        const urlParts = window.location.pathname.split('/');
        scenarioId = urlParts[urlParts.length - 1];

        if (!scenarioId || scenarioId === 'game') {
            console.error("❌ 시나리오 ID를 찾을 수 없습니다.");
            return;
        }

        await loadScenarioInfo(); 
        await loadHistory();
    };

async function loadScenarioInfo() {
        try {
            const response = await fetch(`/api/scenario/${scenarioId}`);
            const data = await response.json();
            
            // [수정/추가] 서버에서 받아온 데이터를 전역 변수에 저장
            currentEvents = data.questLines || [];
            currentQuests = data.quests || {}; // 병렬 퀘스트
            currentInventory = data.inventory || [];
            
            const titleEl = document.getElementById('scenario-title');
            if(titleEl) titleEl.innerText = data.title;
            
            // 기존 사이드바 UI도 일단 유지 (필요 없으면 나중에 삭제)
            updateQuestUI(data.questLines);
        } catch (err) {
            console.error("시나리오 정보 로드 실패", err);
        }
    }

function addMessage(sender, text, isImage = false) {
    const chatWindow = document.getElementById('chat-window');
    if (!chatWindow) return;

    const div = document.createElement('div');
    div.className = `msg ${sender === '마스터' ? 'master' : 'player'}`;
    
    // http로 시작하거나 isImage가 true면 이미지로 처리
    if (isImage || (typeof text === 'string' && text.startsWith('http'))) {
        // 이미 img 태그가 포함되어 올 경우 주소만 추출하거나, 주소면 그대로 사용
        const imgSrc = text.includes('<img') ? text.match(/src=["']([^"']+)["']/)[1] : text;
        div.innerHTML = `<strong>${sender}</strong>: <br><img src="${imgSrc}" onclick="window.open(this.src)" style="cursor:pointer;">`;
    } else {
        div.innerText = `${sender}: ${text}`;
    }
    
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}
async function loadHistory() {
    try {
        const response = await fetch(`/api/chat/${scenarioId}`);
        if (!response.ok) throw new Error('네트워크 응답 오류');
        
        const history = await response.json();
        console.log("📦 서버에서 받은 원본 데이터:", history);

        const chatWindow = document.getElementById('chat-window');
        chatWindow.innerHTML = ''; 

        if (history && history.length > 0) {
            history.forEach((msg) => {
                const isUser = msg.role === 'user' || msg.role === 'player';
                const senderName = isUser ? '나' : '마스터';
                const content = msg.content || "내용이 없는 메시지입니다.";

                // [추가] 내용이 "http"로 시작하면 이미지로 간주합니다.
                const isImg = content.startsWith('http') || content.startsWith('data:image');

                // addMessage를 호출할 때 이미지 여부(isImg)를 함께 보냅니다.
                addMessage(senderName, content, isImg);
            });
            console.log(`✅ ${history.length}개의 메시지를 모두 화면에 그렸습니다.`);
        } else {
            start(); 
        }
    } catch (err) {
        console.error("❌ 대화 기록 표시 중 에러 발생:", err);
    }
}

    // 🌟 핵심 수정: 메시지 전송 함수
    async function send(message = null) {
        // [해결] userText 변수를 명확히 정의
        const userText = message !== null ? message : userInput.value.trim();
        if (!userText) return;

        if (message === null) {
            addMessage("나", userText);
            userInput.value = "";
        }

        showLoading(); // 로딩 시작

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    scenarioId: scenarioId,
                    userMessage: userText, // 서버가 기다리는 이름
                    model: document.getElementById('model-select').value
                })
            });

            if (response.ok) {
                const data = await response.json(); // [해결] text()가 아니라 json()으로 받기
                hideLoading();
                
                // 마스터 답변 출력
                addMessage("마스터", data.reply);
                currentEvents = data.questLines || [];
                currentQuests = data.quests || {};
                currentInventory = data.inventory || [];
                
                // 퀘스트 라인 실시간 업데이트
                if (data.questLines) {
                    updateQuestUI(data.questLines);
                }
            } else {
                hideLoading();
                addMessage("시스템", "마스터가 응답하지 않습니다.");
            }
        } catch (err) {
            hideLoading();
            console.error("❌ 통신 에러:", err);
            addMessage("시스템", "연결 에러가 발생했습니다.");
        }
    }

    function updateQuestUI(questLines) {
        const questList = document.getElementById('quest-list');
        if (!questList) return;
        questList.innerHTML = ""; 
        
        if (questLines && questLines.length > 0) {
            questLines.forEach(quest => {
                const li = document.createElement('li');
                li.style.padding = "8px 0";
                li.style.borderBottom = "1px solid #333";
                li.innerHTML = `📍 ${quest}`;
                questList.appendChild(li);
            });
        } else {
            questList.innerHTML = "<li style='color: #666;'>기록된 사건이 없습니다.</li>";
        }
    }

    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'ai-loading';
        loadingDiv.className = 'loading';
        loadingDiv.innerHTML = `<span>마스터가 주사위를 굴리는 중</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
        chatWindow.appendChild(loadingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function hideLoading() {
        const loader = document.getElementById('ai-loading');
        if (loader) loader.remove();
    }

    function start() { send("게임을 시작해줘."); }

    if (sendBtn) sendBtn.addEventListener('click', () => send());
    if (userInput) userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    // 🗑️ 대화 초기화 함수 (기존 버튼과 연결됨)
async function clearLogs() {
    if (!confirm("모든 대화와 주요 사건 기록을 지우고 처음부터 다시 시작할까요?")) return;
    
    try {
        const response = await fetch(`/api/chat/${scenarioId}`, { method: 'DELETE' });
        if (response.ok) {
            alert("모험이 초기화되었습니다.");
            location.reload(); // 새로고침하면 서버에서 빈 데이터를 가져옵니다.
        }
    } catch (err) {
        console.error("초기화 에러:", err);
    }
}
let currentInventory = [];

function toggleInventoryModal() {
    const modal = document.getElementById('inventoryModal');
    if (modal.style.display === 'none' || modal.style.display === '') {
        const list = document.getElementById('inventory-list-modal');
        list.innerHTML = currentInventory.length > 0 
            ? currentInventory.map(item => `<li>⚔️ ${item}</li>`).join('') 
            : "<li style='color:#666'>비어 있음</li>";
        modal.style.display = 'block';
    } else {
        modal.style.display = 'none';
    }
}
async function generateImage() {
    if (!currentEvents || currentEvents.length === 0) {
        alert("아직 요약된 주요 사건이 없어 그림을 그릴 수 없습니다!");
        return;
    }

    showLoading(); 
    try {
        const response = await fetch('/api/generate-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scenarioId })
        });

        if (response.ok) {
            const data = await response.json(); // [수정] 데이터를 먼저 받고 [cite: 154]
            const imageUrl = data.imageUrl || data.url; // [수정] 그 다음에 URL을 꺼냅니다 [cite: 159]

            hideLoading();
            
            // 1. 화면에 즉시 표시 [cite: 146]
            addMessage("마스터", imageUrl, true);

            // 2. 서버 DB에 저장 요청 (이 과정이 있어야 나중에 불러옵니다) [cite: 6, 9, 23]
            await fetch('/api/chat/save-image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    scenarioId: scenarioId,
                    role: 'assistant',
                    content: imageUrl // 이미지 주소를 텍스트로 저장 [cite: 147]
                })
            });
        } else {
            throw new Error("이미지 생성 실패");
        }
    } catch (err) {
        hideLoading();
        console.error(err);
        alert("이미지 생성 중 에러가 발생했습니다.");
    }
}

// fetch 응답 받는 곳(data)에 아래 한 줄 추가 필수!
// currentInventory = data.inventory || [];
</script>
</body>
</html>
