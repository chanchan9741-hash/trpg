<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모험 중 - Gemini TRPG</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #6c5ce7;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Pretendard', sans-serif;
        }

        /* 채팅창 영역 */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 5%; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /* 메시지 기본 스타일 */
        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 75%; 
            line-height: 1.6;
            word-break: break-all;
            position: relative;
        }

        /* 마스터 메시지 */
        .master { 
            background: #2a2a2a; 
            align-self: flex-start; 
            border-left: 5px solid var(--accent);
            border-bottom-left-radius: 2px;
        }

        /* 플레이어 메시지 */
        .player { 
            background: var(--accent); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        /* 입력 영역 */
        #input-area { 
            padding: 20px 5%; 
            display: flex; 
            gap: 12px; 
            background: var(--card-bg); 
            border-top: 1px solid #333;
        }

        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button { 
            padding: 0 25px; 
            background: var(--accent); 
            border: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 로딩 애니메이션 (점 세 개) */
        .typing { 
            display: flex; 
            gap: 6px; 
            padding: 15px; 
            align-items: center; 
        }

        .dot {
            width: 8px; 
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        /* 로딩 애니메이션 스타일 */
        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            font-style: italic;
            margin: 10px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div style="padding: 10px; background: #1e1e1e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px;">
    <span style="font-size: 0.9rem; color: #b3b3b3;">마스터 지능:</span>
    <select id="model-select" style="background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px; padding: 5px;">
        <option value="gpt-5.4-mini">gpt-5.4-mini (빠름 - 추천)</option>
        <option value="gpt-5.4-nano">gpt-5.4-nano(더 빠름)</option>
        <option value="gpt-5.4">GPT-5.4 (오래걸림)</option>

    </select>
    </div>
    <button onclick="clearLogs()" style="background: #c0392b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">대화 초기화</button>
</div>
    <div id="chat-window"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="당신의 행동을 결정하세요..." autocomplete="off">
        <button id="send-btn">전송</button>
    </div>

    <script>
    // HTML 요소 가져오기 (ID는 찬수 님의 HTML에 맞게 확인하세요)
    const chatWindow = document.getElementById('chat-window'); 
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loadingIndicator = document.getElementById('loading'); // 로딩 애니메이션이 있다면

    // 💡 1. 핵심 전역 변수: 현재 접속한 방(시나리오)의 ID를 저장합니다.
    let scenarioId = "";

    // 💡 2. 페이지 로드 시 실행 (ID 추출 -> 정보 로드 -> 대화 로드)
    window.onload = async () => {
        const urlParts = window.location.pathname.split('/');
        scenarioId = urlParts[urlParts.length - 1]; // URL 맨 끝의 ID 가져오기

        if (!scenarioId || scenarioId === 'game') {
            console.error("❌ 시나리오 ID를 찾을 수 없습니다.");
            return;
        }

        console.log("📍 현재 입장한 시나리오 ID:", scenarioId);

        await loadScenarioInfo(); // 세계관 정보 띄우기
        await loadHistory();      // 📜 과거 대화 내역 불러오기
    };

    // 💡 3. 시나리오 정보 불러오기
    async function loadScenarioInfo() {
        try {
            const response = await fetch('/api/my-scenarios');
            const scenarios = await response.json();
            const current = scenarios.find(s => s._id === scenarioId);
            
            if (current) {
                document.getElementById('scenario-title').innerText = current.title;
                document.getElementById('scenario-desc').innerText = 
                    `세계관: ${current.worldSetting} | 캐릭터: ${current.characterInfo}`;
            }
        } catch (err) {
            console.error("시나리오 정보 로드 실패", err);
        }
    }
    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `msg ${sender === '마스터' ? 'master' : 'player'}`;
        div.innerText = `${sender}: ${text}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 2. 대답 중... 로딩 애니메이션 추가 함수
    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'ai-loading';
        loadingDiv.className = 'loading';
        loadingDiv.innerHTML = `
            <span>마스터가 주사위를 굴리는 중</span>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        `;
        chatWindow.appendChild(loadingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 3. 로딩 애니메이션 제거 함수
    function hideLoading() {
        const loader = document.getElementById('ai-loading');
        if (loader) loader.remove();
    }



    // 💡 5. 📜 서버(DB)에서 과거 대화 기록 가져오기
    async function loadHistory() {
        try {
            const response = await fetch(`/api/chat/${scenarioId}`);
            if (response.ok) {
                const history = await response.json();
                chatWindow.innerHTML = ''; // 로딩 중 텍스트 지우기

                // 대화 내역을 순서대로 화면에 출력
                history.forEach(msg => {
                    const sender = msg.role === 'user' ? '나' : '마스터';
                    addMessage(sender, msg.content);
                });
                
                // 만약 대화 기록이 하나도 없다면 자동으로 게임 시작!
                if (history.length === 0) {
                    start();
                }
            }
        } catch (err) {
            console.error("❌ 대화 기록 불러오기 실패:", err);
            addMessage("시스템", "대화 기록을 불러오지 못했습니다.");
        }
    }
// 🗑️ 대화 초기화 함수 수정본
async function clearLogs() {
    if (!confirm("지금까지의 모든 대화 기록을 지울까요?")) return;
    
    try {
        const response = await fetch(`/api/chat/${scenarioId}`, { 
            method: 'DELETE' 
        });

        // 💡 응답이 성공(200~299)인지 확인
        if (response.ok) {
            alert("기록이 성공적으로 초기화되었습니다.");
            // 초기화 후 깔끔하게 첫 화면으로 이동하거나 새로고침합니다.
            location.reload(); 
        } else {
            // 서버에서 에러 코드를 보냈을 때
            const errorText = await response.text();
            console.error("초기화 서버 응답 에러:", errorText);
            alert("초기화 실패: 서버 응답에 문제가 있습니다.");
        }
    } catch (err) {
        console.error("초기화 네트워크 에러:", err);
        alert("초기화 실패: 네트워크 연결을 확인하세요.");
    }
}
    // 💡 6. 메시지 전송 및 DB 저장
    async function send(message = null) {
        const userText = message !== null ? message : userInput.value.trim();
        
        if (message === null && !userText) return; // 빈 칸이면 무시
        
        if (message === null) {
            addMessage("나", userText); // 내 화면에 출력
            userInput.value = "";       // 입력창 비우기
        }

        // 로딩 표시 켜기
        if (loadingIndicator) loadingIndicator.style.display = 'block';

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    scenarioId: scenarioId, // 🌟 위에서 저장한 방 번호를 서버로 보냄! (저장 필수 조건)
                    userMessage: userText
                })
            });

            if (response.ok) {
                const aiReply = await response.text();
                addMessage("마스터", aiReply);
            } else {
                addMessage("시스템", `마스터가 혼란에 빠졌습니다. (에러: ${response.status})`);
            }
        } catch (err) {
            console.error("❌ 통신 에러:", err);
            addMessage("시스템", "서버와 연결할 수 없습니다.");
        } finally {
            // 로딩 표시 끄기
            if (loadingIndicator) loadingIndicator.style.display = 'none';
        }
    }

    // 💡 7. 초기 게임 시작 신호
    function start() {
        send("게임을 시작해줘."); 
    }

    // 💡 8. 엔터키 및 클릭 이벤트 연결
    if (sendBtn) sendBtn.addEventListener('click', () => send());
    if (userInput) userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') send();
    });

</script>
</body>
</html>
